<!DOCTYPE html>
<html>
<head>
    <title>AI Study Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="logo-box"><h3>📚 AI Study</h3></div>
        <div class="mode-box">
            <button class="mode-btn active" onclick="setMode('explain', this)">🧠 Explain</button>
            <button class="mode-btn" onclick="setMode('quiz', this)">❓ Quiz</button>
            <button class="mode-btn" onclick="setMode('summary', this)">📝 Summary</button>
            <button class="mode-btn" onclick="setMode('plan', this)">📅 Study Plan</button>
        </div>
        <input type="hidden" id="mode" value="explain">
        <hr>
        <a href="/logout">🚪 Logout</a>
    </div>

    <div class="main">
        <div id="chatbox" class="chatbox"></div>
        <div class="input-area">
            <input id="topic" placeholder="Ask anything...">
            <button onclick="generate()">Send</button>
        </div>
    </div>
</div>

<script>
function setMode(mode, element) {
    document.getElementById("mode").value = mode;
    document.querySelectorAll(".mode-btn").forEach(btn => btn.classList.remove("active"));
    element.classList.add("active");
}

function addMessage(role, content, isQuiz = false) {
    const chat = document.getElementById("chatbox");
    const div = document.createElement("div");
    div.className = role === "user" ? "msg user" : "msg ai";

    if (isQuiz) {
        div.innerHTML = content;
    } else {
        div.innerText = content;
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function generate() {
    const topic = document.getElementById("topic").value;
    const mode = document.getElementById("mode").value;
    if (!topic) return;

    addMessage("user", topic);
    const thinking = document.createElement("div");
    thinking.className = "msg ai";
    thinking.innerText = "Thinking... 🤔";
    document.getElementById("chatbox").appendChild(thinking);

    const res = await fetch("/generate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({topic, mode})
    });
    const data = await res.json();
    thinking.remove();

    if (data.quiz_data) {
        renderQuiz(data.quiz_data);
    } else {
        addMessage("ai", data.response);
    }
    document.getElementById("topic").value = "";
}

function renderQuiz(data) {
    const questions = data.questions || [];
    questions.forEach((q, idx) => {
        let html = `<div class="quiz-card">
            <p><strong>${q.question}</strong></p>
            <div class="quiz-grid">
                ${q.options.map((opt, i) => `
                    <button class="quiz-opt opt-${i}" onclick="checkAnswer(this, ${i}, ${q.correct_idx})">
                        ${opt}
                    </button>
                `).join('')}
            </div>
            <div class="feedback"></div>
        </div>`;
        addMessage("ai", html, true);
    });
}

function checkAnswer(btn, selected, correct) {
    const card = btn.closest('.quiz-card');
    const feedback = card.querySelector('.feedback');
    card.querySelectorAll('button').forEach(b => b.disabled = true);

    if (selected === correct) {
        btn.style.boxShadow = "0 0 15px #26890c";
        feedback.innerHTML = "✅ Correct!";
    } else {
        btn.style.opacity = "0.5";
        card.querySelector(`.opt-${correct}`).style.border = "3px solid white";
        feedback.innerHTML = "❌ Wrong choice!";
    }
}
</script>
</body>
</html>
